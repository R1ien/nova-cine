<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#080c14">
<title>NovaCiné — Connexion</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="js/app.js"></script>
<link rel="stylesheet" href="css/style.css">
<style>
body {
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh; padding: 1rem;
  background:
    radial-gradient(ellipse at 30% 20%, rgba(232,160,32,.09) 0%, transparent 55%),
    radial-gradient(ellipse at 80% 80%, rgba(192,57,43,.07) 0%, transparent 50%),
    var(--bg);
}

/* Film strip decoration */
body::before, body::after {
  content: '';
  position: fixed; top: 0; bottom: 0; width: 48px;
  background: repeating-linear-gradient(
    to bottom,
    var(--surface) 0px, var(--surface) 32px,
    transparent 32px, transparent 48px
  );
  border-right: 1px solid var(--border);
  opacity: .35; pointer-events: none;
}
body::before { left: 0; }
body::after  { right: 0; border-right: none; border-left: 1px solid var(--border); }

.auth-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 3rem 2.5rem;
  width: 100%; max-width: 420px;
  position: relative; overflow: hidden;
  box-shadow: 0 32px 80px rgba(0,0,0,.6);
  animation: cardIn .4s cubic-bezier(.16,1,.3,1);
}
@keyframes cardIn { from { opacity:0; transform: translateY(24px) scale(.97); } to { opacity:1; transform: none; } }
.auth-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: linear-gradient(to right, var(--accent2), var(--accent));
}

.auth-logo {
  font-family: 'Bebas Neue', cursive; font-size: 2.6rem;
  letter-spacing: .12em; text-align: center; margin-bottom: .15rem;
  color: var(--accent);
}
.auth-logo span { color: var(--text); }
.auth-tagline {
  text-align: center; color: var(--muted); font-size: .83rem;
  margin-bottom: 2.2rem; line-height: 1.5;
}

/* Tabs */
.auth-tabs {
  display: flex; border: 1px solid var(--border);
  border-radius: 10px; overflow: hidden; margin-bottom: 2rem;
}
.auth-tab {
  flex: 1; padding: .7rem; background: none; border: none;
  color: var(--muted); font-family: 'DM Sans', sans-serif;
  font-size: .88rem; cursor: pointer; transition: background .2s, color .2s;
}
.auth-tab.active { background: var(--accent); color: #000; font-weight: 700; }

/* Forms */
.auth-form { display: none; }
.auth-form.active { display: block; }

.auth-field { margin-bottom: 1.1rem; }
.auth-field label {
  display: block; font-size: .78rem; color: var(--muted);
  margin-bottom: .4rem; font-weight: 500; letter-spacing: .04em;
}
.input-wrap { position: relative; }
.auth-input {
  width: 100%; background: var(--surface2); border: 1px solid var(--border);
  color: var(--text); font-family: 'DM Sans', sans-serif; font-size: .92rem;
  padding: .7rem 1rem; border-radius: 8px; outline: none;
  transition: border-color .2s, box-shadow .2s;
}
.auth-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(232,160,32,.12); }

.pw-strength { height: 3px; border-radius: 2px; background: var(--border); overflow: hidden; margin-top: .5rem; }
.pw-strength-fill { height: 100%; border-radius: 2px; width: 0%; transition: width .3s, background .3s; }
.pw-hint { font-size: .72rem; color: var(--muted); margin-top: .3rem; }

.auth-btn { touch-action:manipulation;
  width: 100%; background: var(--accent); color: #000; font-weight: 700;
  border: none; padding: .82rem; border-radius: 9px; cursor: pointer;
  font-family: 'DM Sans', sans-serif; font-size: .95rem;
  transition: opacity .2s, transform .15s; margin-top: .4rem;
}
.auth-btn:hover { opacity: .88; transform: translateY(-1px); }
.auth-btn:disabled { opacity: .45; cursor: default; transform: none; }

.auth-error { color: #e74c3c; font-size: .82rem; margin-top: .7rem; text-align: center; min-height: 1.1rem; }
.auth-success { color: var(--green); font-size: .82rem; margin-top: .7rem; text-align: center; min-height: 1.1rem; }

.auth-divider {
  display: flex; align-items: center; gap: .8rem;
  margin: 1.4rem 0; color: var(--muted); font-size: .78rem;
}
.auth-divider::before, .auth-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

.auth-skip { touch-action:manipulation;
  display: block; width: 100%; text-align: center; padding: .7rem;
  background: none; border: 1px solid var(--border); border-radius: 9px;
  color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: .85rem;
  cursor: pointer; transition: background .2s, color .2s; text-decoration: none;
}
.auth-skip:hover { background: var(--surface2); color: var(--text); }

@media(max-width:480px){
  .auth-card{padding:2rem 1.4rem 2.5rem;border-radius:0;border-left:none;border-right:none;min-height:100vh;display:flex;flex-direction:column;justify-content:center;}
  body{align-items:flex-start;}
  .auth-btn{padding:.88rem;font-size:1rem;}
  .auth-input{font-size:1rem;padding:.78rem 1rem;}
}
</style>
</head>
<body>

<div class="auth-card">
  <div class="auth-logo">NOVA<span>CINÉ</span></div>
  <div class="auth-tagline">Votre cinéma personnel,<br>toujours où vous en étiez.</div>

  <div class="auth-tabs">
    <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">Connexion</button>
    <button class="auth-tab" id="tab-register" onclick="switchTab('register')">Créer un compte</button>
  </div>

  <!-- ── LOGIN ── -->
  <div class="auth-form active" id="form-login">
    <div class="auth-field">
      <label>Nom d'utilisateur</label>
      <input class="auth-input" type="text" id="login-username"
        placeholder="votre_pseudo" autocomplete="username"
        onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <div class="auth-field">
      <label>Mot de passe</label>
      <input class="auth-input" type="password" id="login-password"
        placeholder="••••••••" autocomplete="current-password"
        onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <div class="auth-error" id="login-error"></div>
    <button class="auth-btn" id="login-btn" onclick="doLogin()">Se connecter</button>
    <div class="auth-divider">ou</div>
    <button class="auth-skip" onclick="continueAsGuest()">Continuer sans compte →</button>
  </div>

  <!-- ── REGISTER ── -->
  <div class="auth-form" id="form-register">
    <div class="auth-field">
      <label>Nom d'utilisateur</label>
      <input class="auth-input" type="text" id="reg-username"
        placeholder="votre_pseudo" autocomplete="username"
        oninput="validateUsername()">
    </div>
    <div class="auth-field">
      <label>Mot de passe</label>
      <input class="auth-input" type="password" id="reg-password"
        placeholder="••••••••" autocomplete="new-password"
        oninput="checkPwStrength()">
      <div class="pw-strength"><div class="pw-strength-fill" id="pw-fill"></div></div>
      <div class="pw-hint" id="pw-hint">6 caractères minimum</div>
    </div>
    <div class="auth-field">
      <label>Confirmer le mot de passe</label>
      <input class="auth-input" type="password" id="reg-confirm"
        placeholder="••••••••" autocomplete="new-password"
        onkeydown="if(event.key==='Enter')doRegister()">
    </div>
    <div class="auth-error" id="reg-error"></div>
    <div class="auth-success" id="reg-success"></div>
    <button class="auth-btn" id="reg-btn" onclick="doRegister()">Créer le compte</button>
    <div class="auth-divider">ou</div>
    <button class="auth-skip" onclick="continueAsGuest()">Continuer sans compte →</button>
  </div>
</div>

<script>
// Redirect if already logged in
(function(){
  initSB();
  var s = getSession();
  if (s && s.id) window.location.href = 'index.html';
})();

function switchTab(t) {
  document.getElementById('tab-login').classList.toggle('active', t === 'login');
  document.getElementById('tab-register').classList.toggle('active', t === 'register');
  document.getElementById('form-login').classList.toggle('active', t === 'login');
  document.getElementById('form-register').classList.toggle('active', t === 'register');
  // Clear errors
  document.getElementById('login-error').textContent = '';
  document.getElementById('reg-error').textContent = '';
  document.getElementById('reg-success').textContent = '';
}

function validateUsername() {
  var v = document.getElementById('reg-username').value.trim();
  var err = document.getElementById('reg-error');
  if (v.length > 0 && v.length < 3) err.textContent = 'Au moins 3 caractères.';
  else if (v.length > 0 && !/^[a-zA-Z0-9_.-]+$/.test(v)) err.textContent = 'Lettres, chiffres, _ . - uniquement.';
  else err.textContent = '';
}

function checkPwStrength() {
  var pw = document.getElementById('reg-password').value;
  var score = 0;
  if (pw.length >= 6) score++;
  if (pw.length >= 10) score++;
  if (/[A-Z]/.test(pw)) score++;
  if (/[0-9]/.test(pw)) score++;
  if (/[^a-zA-Z0-9]/.test(pw)) score++;
  var colors = ['#e74c3c','#e8a020','#f1c40f','#2ecc71','#27ae60'];
  var hints  = ['Très faible','Faible','Moyen','Fort','Très fort'];
  var fill = document.getElementById('pw-fill');
  var hint = document.getElementById('pw-hint');
  fill.style.width = (score * 20) + '%';
  fill.style.background = colors[Math.max(0, score - 1)];
  hint.textContent = pw.length ? hints[Math.max(0, score - 1)] : '6 caractères minimum';
  hint.style.color = score >= 3 ? 'var(--green)' : 'var(--muted)';
}

async function doLogin() {
  var username = document.getElementById('login-username').value.trim();
  var pw = document.getElementById('login-password').value;
  var err = document.getElementById('login-error');
  err.textContent = '';
  if (!username || !pw) { err.textContent = 'Remplissez tous les champs.'; return; }
  var btn = document.getElementById('login-btn');
  btn.disabled = true; btn.textContent = 'Connexion…';
  try {
    var pwHash = await sha256(pw + username);
    var user = await dbLoginUser(username, pwHash);
    if (!user) { err.textContent = 'Identifiants incorrects.'; btn.disabled = false; btn.textContent = 'Se connecter'; return; }
    setSession(user);
    window.location.href = 'index.html';
  } catch(e) {
    err.textContent = e.message || 'Erreur de connexion.';
    btn.disabled = false; btn.textContent = 'Se connecter';
  }
}

async function doRegister() {
  var username = document.getElementById('reg-username').value.trim();
  var pw       = document.getElementById('reg-password').value;
  var pw2      = document.getElementById('reg-confirm').value;
  var err      = document.getElementById('reg-error');
  var ok       = document.getElementById('reg-success');
  err.textContent = ''; ok.textContent = '';
  if (!username || username.length < 3)          { err.textContent = 'Nom d\'utilisateur trop court (3 car. min).'; return; }
  if (!/^[a-zA-Z0-9_.-]+$/.test(username))       { err.textContent = 'Caractères invalides dans le nom.'; return; }
  if (pw.length < 6)                             { err.textContent = 'Mot de passe trop court (6 car. min).'; return; }
  if (pw !== pw2)                                { err.textContent = 'Les mots de passe ne correspondent pas.'; return; }
  var btn = document.getElementById('reg-btn');
  btn.disabled = true; btn.textContent = 'Création…';
  try {
    var pwHash = await sha256(pw + username);
    var user = await dbCreateUser(username, pwHash);
    ok.textContent = 'Compte créé ! Redirection…';
    setSession(user);
    setTimeout(function(){ window.location.href = 'index.html'; }, 900);
  } catch(e) {
    err.textContent = e.message || 'Erreur lors de la création.';
    btn.disabled = false; btn.textContent = 'Créer le compte';
  }
}

function continueAsGuest() {
  clearSession();
  window.location.href = 'index.html';
}
</script>
</body>
</html>
