<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#080c14">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="css/style.css">
<style>
.page-wrap{padding:calc(var(--nav-h) + 1.5rem) 1rem 3rem;}
.page-wrap h1{font-family:'Bebas Neue',cursive;font-size:2rem;margin-bottom:1.2rem;}
.page-wrap h1 span{color:var(--accent);}
@media(min-width:640px){.page-wrap{padding:calc(var(--nav-h) + 2rem) 1.5rem 3rem;}}
@media(min-width:900px){.page-wrap{padding:calc(var(--nav-h) + 2.5rem) 3.5rem 3rem;}.page-wrap h1{font-size:2.5rem;}}
@media(min-width:1200px){.page-wrap{padding:calc(var(--nav-h) + 2.5rem) 4rem 3rem;}}
</style>
  <!-- Plyr -->
  <link rel="stylesheet" href="https://cdn.plyr.io/3.8.4/plyr.css">
  <script src="https://cdn.plyr.io/3.8.4/plyr.js"></script>
</head>
<body>
<nav>
  <a class="logo" href="index.html">NOVA<span>CINÉ</span></a>
  <div class="nav-links">
    <a href="index.html" data-page="home">Accueil</a>
    <a href="films.html" data-page="films" class="active">Films</a>
    <a href="series.html" data-page="series">Séries</a>
  </div>
  <div class="nav-right">
    <a class="nav-login-btn hidden" href="login.html">Se connecter</a>
    <div class="user-badge" id="user-badge">
      <div class="user-avatar" id="user-avatar">?</div>
      <span class="user-name" id="user-name-display"></span>
      <button class="logout-btn" onclick="doLogout()">✕</button>
    </div>
    <button class="wrench-btn" onclick="window.location.href='admin.html'" title="Administration">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
    </button>
    <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
  </div>
</nav>
<div class="mobile-menu" id="mobile-menu">
  <a href="index.html" data-page="home">🏠 Accueil</a>
  <a href="films.html" data-page="films">🎬 Films</a>
  <a href="series.html" data-page="series">📺 Séries</a>
  <div class="mobile-menu-footer"><a class="nav-login-btn hidden" href="login.html" style="display:flex;justify-content:center;">Se connecter →</a></div>
</div>

<div class="page-wrap">
  <h1>Tous les <span>Films</span></h1>
  <div class="filter-bar" id="filter-bar"></div>
  <div class="cards-row" id="row-films"></div>
</div>

<div class="player-overlay" id="player-overlay">
  <button class="modal-close" onclick="closePlayer()">✕</button>
  <div class="player-modal">
    <div class="player-wrap" id="player-wrap"></div>
    <div class="modal-info" id="player-info"></div>
  </div>
</div>
<div class="notif" id="notif"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script><script src="js/app.js"></script><script src="js/player.js"></script><script src="js/nav.js"></script>
<script>
var currentUser=null,currentPlayCtx=null,saveTimer=null,activeGenre='Tous';
(async function(){
  initSB();currentUser=getSession();initNav('films');
  if(currentUser)await loadUserProgress(currentUser.id);
  await loadFilms();renderFilters();renderFilms(films);initLazyImages();
})();
function renderFilters(){
  var genres=['Tous'];
  films.forEach(function(f){if(f.genre&&genres.indexOf(f.genre)===-1)genres.push(f.genre);});
  document.getElementById('filter-bar').innerHTML=genres.map(function(g){
    return '<button class="filter-btn'+(g===activeGenre?' active':'')+'" onclick="filterBy(\''+esc(g)+'\')">'+esc(g)+'</button>';
  }).join('');
}
function filterBy(g){activeGenre=g;renderFilters();renderFilms(g==='Tous'?films:films.filter(function(f){return f.genre===g;}));}
function renderFilms(list){
  document.getElementById('row-films').innerHTML=list.length
    ?list.map(makeCard).join('')
    :'<p style="color:var(--muted);padding:1rem;font-size:.85rem;">Aucun film.</p>';
  initLazyImages();
}
function makeCard(f){
  var p=getProgress(f.id);var bar='',badge='';
  if(p&&p.percent>2&&!p.completed){bar='<div class="card-progress"><div class="card-progress-fill" style="width:'+Math.min(100,p.percent)+'%"></div></div>';badge='<div class="card-resume">REPRENDRE</div>';}
  return '<div class="card" onclick="playFilm(\''+f.id+'\')">'
    +(f.image_url?'<img data-src="'+esc(f.image_url)+'" alt="'+esc(f.title)+'" loading="lazy" decoding="async">':'<div class="card-no-img">'+svgFilm()+'</div>')
    +badge+'<div class="card-overlay"><div class="card-name">'+esc(f.title)+'</div><div class="card-meta">'+esc(f.genre||'')+' '+(f.year||'')+'</div></div>'
    +'<button class="card-play">▶</button>'+bar+'</div>';
}
function videoType(u){var e=u.split('.').pop().split('?')[0].toLowerCase();return({mp4:'video/mp4',mkv:'video/x-matroska',mov:'video/quicktime',avi:'video/x-msvideo',webm:'video/webm',ogv:'video/ogg',m4v:'video/mp4',flv:'video/x-flv'})[e]||'video/mp4';}
// buildPlayer → player.js

function playFilm(id){
  var f=films.find(function(x){return x.id===id;});if(!f)return;
  var p=getProgress(id);var r=(p&&!p.completed)?p.position:0;
  currentPlayCtx={type:'film',id:id};buildPlayer(f.video_url,r);
  document.getElementById('player-info').innerHTML='<div class="modal-title">'+esc(f.title)+'</div><div class="modal-meta">'+esc(f.genre||'')+(f.year?' · '+f.year:'')+(r>2?' · <span style="color:var(--accent)">Reprise à '+fmt(r)+'</span>':'')+'</div>'+(f.description?'<div class="modal-desc">'+esc(f.description)+'</div>':'');
  document.getElementById('player-overlay').classList.add('open');
  if(currentUser){if(saveTimer)clearInterval(saveTimer);saveTimer=setInterval(function(){if(_vstPlayer&&playerDuration()>0)saveProgress(currentUser.id,id,true,playerCurrentTime(),playerDuration());},5000);}
}
function closePlayer(){
  if(saveTimer){clearInterval(saveTimer);saveTimer=null;}
  if(_vstPlayer&&currentPlayCtx&&playerDuration()>0&&currentUser)saveProgress(currentUser.id,currentPlayCtx.id,true,playerCurrentTime(),playerDuration());
  document.getElementById('player-overlay').classList.remove('open');playerDispose();document.getElementById('player-wrap').innerHTML='';currentPlayCtx=null;
  renderFilms(activeGenre==='Tous'?films:films.filter(function(f){return f.genre===activeGenre;}));
}
function togglePlay(){playerTogglePlay();}
function skip(s){playerSkip(s);}
function setVol(v){playerSetVol(v);}
function toggleMute(){playerToggleMute();}
function toggleFS(){playerToggleFS();}
// seekV → player.js
document.getElementById('player-overlay').addEventListener('click',function(e){if(e.target===this)closePlayer();});
document.addEventListener('keydown',function(e){if(e.key==='Escape')closePlayer();playerKeydown(e);});
window.addEventListener('beforeunload',function(){if(vidEl&&currentPlayCtx&&!isNaN(vidEl.duration)&&currentUser)saveProgress(currentUser.id,currentPlayCtx.id,true,playerCurrentTime(),playerDuration());});
</script>
</body>
</html>
