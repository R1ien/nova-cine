<style>
.page-wrap{padding:calc(var(--nav-h) + 1.5rem) 1rem 3rem;}
.page-wrap h1{font-family:'Bebas Neue',cursive;font-size:2rem;margin-bottom:1.2rem;}
.page-wrap h1 span{color:var(--accent);}
@media(min-width:640px){.page-wrap{padding:calc(var(--nav-h) + 2rem) 1.5rem 3rem;}}
@media(min-width:900px){.page-wrap{padding:calc(var(--nav-h) + 2.5rem) 3.5rem 3rem;}.page-wrap h1{font-size:2.5rem;}}
@media(min-width:1200px){.page-wrap{padding:calc(var(--nav-h) + 2.5rem) 4rem 3rem;}}
</style>
  <!-- Plyr -->
  <link rel="stylesheet" href="https://cdn.plyr.io/3.8.4/plyr.css">
  <script src="https://cdn.plyr.io/3.8.4/plyr.js"></script>
</head>
<body>
<nav>
  <a class="logo" href="index.html">NOVA<span>CINÉ</span></a>

  </div>

    <a class="nav-login-btn hidden" href="login.html">Se connecter</a>
    <div class="user-badge" id="user-badge">
      <div class="user-avatar" id="user-avatar">?</div>

      <button class="logout-btn" onclick="doLogout()">✕</button>
    </div>
    <button class="wrench-btn" onclick="window.location.href='admin.html'" title="Administration">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
    </button>
    <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
  </div>
</nav>
<div class="mobile-menu" id="mobile-menu">
  <a href="index.html" data-page="home">🏠 Accueil</a>
  <a href="films.html" data-page="films">🎬 Films</a>
  <a href="series.html" data-page="series">📺 Séries</a>
  <div class="mobile-menu-footer"><a class="nav-login-btn hidden" href="login.html" style="display:flex;justify-content:center;">Se connecter →</a></div>
</div>

<div class="page-wrap">
  <h1>Toutes les <span>Séries</span></h1>
  <div class="filter-bar" id="filter-bar"></div>
  <div class="cards-row" id="row-series"></div>
</div>

<div class="player-overlay" id="player-overlay">
  <div class="player-modal">
    <div class="player-wrap" id="player-wrap"></div>
    <div class="modal-info" id="player-info"></div>
  </div>
</div>
<!-- Bouton fermer complètement séparé du lecteur -->
<button id="nc-close-btn" style="
  display:none;position:fixed;top:12px;right:12px;z-index:2147483647;
  width:40px;height:40px;border-radius:50%;border:none;cursor:pointer;
  background:rgba(0,0,0,.85);color:#fff;font-size:1.2rem;
  align-items:center;justify-content:center;
  box-shadow:0 2px 12px rgba(0,0,0,.5);
">✕</button>
<div class="notif" id="notif"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script><script src="js/app.js"></script><script src="js/player.js"></script><script src="js/nav.js"></script>
<script>
/* Restaurer le scroll après fermeture du lecteur */
(function() {
  if (!window.location.hash) {
    var saved = sessionStorage.getItem('nc_scroll_' + window.location.pathname);
    if (saved) {
      sessionStorage.removeItem('nc_scroll_' + window.location.pathname);
      window.addEventListener('load', function() {
        setTimeout(function() { window.scrollTo(0, parseInt(saved)); }, 50);
      });
    }
  }
})();
var currentUser=null,currentPlayCtx=null,saveTimer=null,activeGenre='Tous';
(async function(){
  initSB();currentUser=getSession();initNav('series');
  if(currentUser)await loadUserProgress(currentUser.id);
  await loadSeries();renderFilters();renderList(series);initLazyImages();
})();
function renderFilters(){
  var genres=['Tous'];
  series.forEach(function(s){if(s.genre&&genres.indexOf(s.genre)===-1)genres.push(s.genre);});
  document.getElementById('filter-bar').innerHTML=genres.map(function(g){
    return '<button class="filter-btn'+(g===activeGenre?' active':'')+'" onclick="filterBy(\''+esc(g)+'\')">'+esc(g)+'</button>';
  }).join('');
}
function filterBy(g){activeGenre=g;renderFilters();renderList(g==='Tous'?series:series.filter(function(s){return s.genre===g;}));}
function renderList(list){
  document.getElementById('row-series').innerHTML=list.length
    ?list.map(makeCard).join('')
    :'<p style="color:var(--muted);padding:1rem;font-size:.85rem;">Aucune série.</p>';
  initLazyImages();
}
function makeCard(s){
  var p=getProgress(s.id);var bar='',badge='';
  if(p&&p.percent>2&&!p.completed){bar='<div class="card-progress"><div class="card-progress-fill" style="width:'+Math.min(100,p.percent)+'%"></div></div>';badge='<div class="card-resume">REPRENDRE</div>';}
  return '<div class="card" onclick="playSeries(\''+s.id+'\')">'
    +(s.image_url?'<img data-src="'+esc(s.image_url)+'" alt="'+esc(s.title)+'" loading="lazy" decoding="async">':'<div class="card-no-img">'+svgSeries()+'</div>')
    +badge+'<div class="card-overlay"><div class="card-name">'+esc(s.title)+'</div><div class="card-meta">'+esc(s.genre||'')+' '+(s.year||'')+'</div></div>'
    +'<button class="card-play">▶</button>'+bar+'</div>';
}
function videoType(u){var e=u.split('.').pop().split('?')[0].toLowerCase();return({mp4:'video/mp4',mkv:'video/x-matroska',mov:'video/quicktime',avi:'video/x-msvideo',webm:'video/webm',ogv:'video/ogg',m4v:'video/mp4',flv:'video/x-flv'})[e]||'video/mp4';}
// buildPlayer → player.js

function startSave(id){if(saveTimer)clearInterval(saveTimer);if(!currentUser)return;saveTimer=setInterval(function(){if(_vstPlayer&&playerDuration()>0)saveProgress(currentUser.id,id,false,vidEl.currentTime,vidEl.duration);},5000);}
function stopSave(id){if(saveTimer){clearInterval(saveTimer);saveTimer=null;}if(id&&vidEl&&!isNaN(vidEl.duration)&&vidEl.duration>0&&currentUser)saveProgress(currentUser.id,id,false,vidEl.currentTime,vidEl.duration);}
function buildInfo(s, eps, activeId) {
  var seasons = [];
  eps.forEach(function(ep) {
    var sn = ep.season_number || 1;
    if (seasons.indexOf(sn) === -1) seasons.push(sn);
  });
  seasons.sort(function(a,b){return a-b;});

  var activeEp = eps.find(function(e){return e.id===activeId;});
  var activeSeason = activeEp ? (activeEp.season_number||1) : seasons[0];
  var seasonEps = eps.filter(function(e){return (e.season_number||1)===activeSeason;});

  var seasonOptions = seasons.map(function(sn){
    return '<option value="'+sn+'"'+(sn===activeSeason?' selected':'')+'>Saison '+sn+'</option>';
  }).join('');

  var epOptions = seasonEps.map(function(ep){
    var p = getProgress(ep.id);
    var label = 'Ep '+(ep.episode_number||1)+' \u2014 '+esc(ep.title);
    if (p && p.percent > 2) label += p.completed ? ' \u2713' : ' ('+fmt(p.position)+')';
    return '<option value="'+ep.id+'"'+(ep.id===activeId?' selected':'')+'>'+label+'</option>';
  }).join('');

  var prog = activeEp ? getProgress(activeEp.id) : null;
  var resumeInfo = (prog && prog.percent > 2 && !prog.completed)
    ? ' \u00b7 <span style="color:var(--accent)">Reprise \u00e0 '+fmt(prog.position)+'</span>' : '';

  return '<div class="modal-title">'+esc(s.title)+'</div>'
    +'<div class="modal-meta">'+esc(s.genre||'')+(s.year?' \u00b7 '+s.year:'')+resumeInfo+'</div>'
    +(s.description?'<div class="modal-desc">'+esc(s.description)+'</div>':'')
    +(seasons.length>0
      ?'<div class="ep-selects">'
        +'<select id="sel-season" onchange="onSeasonChange(this.value)" style="background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:.5rem .8rem;border-radius:8px;font-family:\'DM Sans\',sans-serif;font-size:.85rem;cursor:pointer;outline:none;flex:1;">'+seasonOptions+'</select>'
        +'<select id="sel-ep" onchange="onEpChange(this.value)" style="background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:.5rem .8rem;border-radius:8px;font-family:\'DM Sans\',sans-serif;font-size:.85rem;cursor:pointer;outline:none;flex:2;">'+epOptions+'</select>'
        +'</div>'
      :'');
}

function onSeasonChange(seasonNum) {
  var eps = window._seps || [];
  var sn = parseInt(seasonNum);
  var seasonEps = eps.filter(function(e){return (e.season_number||1)===sn;});
  var sel = document.getElementById('sel-ep');
  if (!sel) return;
  sel.innerHTML = seasonEps.map(function(ep){
    var p = getProgress(ep.id);
    var label = 'Ep '+(ep.episode_number||1)+' \u2014 '+esc(ep.title);
    if (p && p.percent > 2) label += p.completed ? ' \u2713' : ' ('+fmt(p.position)+')';
    return '<option value="'+ep.id+'">'+label+'</option>';
  }).join('');
  if (seasonEps.length) onEpChange(seasonEps[0].id);
}

function onEpChange(epId) {
  var sel = document.getElementById('sel-ep');
  if (sel) sel.value = epId;
  switchEp(epId);
}

function switchEp(epId) {
  var prevId = currentPlayCtx ? currentPlayCtx.id : null;
  stopSave(prevId);
  var eps = window._seps || [];
  var s = window._sobj;
  var ep = eps.find(function(x){return x.id===epId;});
  if (!ep) return;
  var p = getProgress(epId);
  var r = (p && !p.completed) ? p.position : 0;
  currentPlayCtx = {type:'episode', id:epId};
  buildPlayer(ep.video_url, r);
  if (s) document.getElementById('player-info').innerHTML = buildInfo(s, eps, epId);
  startSave(epId);
}
function closePlayer(){var id=currentPlayCtx?currentPlayCtx.id:null;stopSave(id);document.getElementById('player-overlay').classList.remove('open');var _b=document.getElementById('nc-close-btn');if(_b)_b.style.display='none';playerDispose();document.getElementById('player-wrap').innerHTML='';currentPlayCtx=null;renderList(activeGenre==='Tous'?series:series.filter(function(s){return s.genre===activeGenre;}));}
function togglePlay(){playerTogglePlay();}
function skip(s){playerSkip(s);}
function setVol(v){playerSetVol(v);}
function toggleMute(){playerToggleMute();}
function toggleFS(){playerToggleFS();}
// seekV → player.js
/* Fermer via popstate — fonctionne avec le bouton retour et le hash */
window.addEventListener('hashchange', function() {
  if (!window.location.hash) {
    sessionStorage.setItem('nc_scroll_' + window.location.pathname, window.scrollY);
    window.location.href = window.location.pathname;
  }
});
var _ncCloseBtn = document.getElementById('nc-close-btn');
if (_ncCloseBtn) _ncCloseBtn.onclick = function() {
  sessionStorage.setItem('nc_scroll_' + window.location.pathname, window.scrollY);
  window.location.hash = '';
};
/* Fond sombre cliquable */
document.getElementById('player-overlay').addEventListener('click', function(e) {
  if (e.target === this) { sessionStorage.setItem('nc_scroll_' + window.location.pathname, window.scrollY); window.location.hash = ''; }
});
document.addEventListener('keydown',function(e){if(e.key==='Escape')closePlayer();playerKeydown(e);});
window.addEventListener('beforeunload',function(){var id=currentPlayCtx?currentPlayCtx.id:null;stopSave(id);});
</script>
</body>
</html>
